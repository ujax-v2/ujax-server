global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'ujax-spring-boot'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ujax-app:8080']

  - job_name: 'node-exporter-app'
    static_configs:
      - targets: ['ujax-node-exporter:9100']

  - job_name: 'node-exporter-judge'
    static_configs:
      - targets: ['10.0.1.238:9100']
