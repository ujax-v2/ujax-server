spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:mysql://${RDS_ENDPOINT:localhost}:3306/ujax?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=false&rewriteBatchedStatements=true
    username: ujax_user
    password: ${RDS_PASSWORD:ujax1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 32

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379

judge0:
  api:
    url: http://localhost:2358
app:
  ujax:
    base-url: http://localhost:5173
    frontend-callback-url: http://localhost:5173/auth/callback


spring.security.oauth2.client:
  registration:
    google:
      redirect-uri: http://localhost:8080/login/oauth2/code/google
    kakao:
      redirect-uri: http://localhost:8080/login/oauth2/code/kakao

