openapi: 3.0.1
info:
  title: ujax API
  description: 백준 알고리즘 스터디 프로젝트 백엔드 API
  version: 0.0.1-SNAPSHOT
servers:
- url: http://localhost:8080
security:
- bearerAuth: []
tags: []
paths:
  /api/v1/workspaces:
    get:
      tags:
      - Workspace
      summary: 내 워크스페이스 목록 조회
      description: 유저가 속한 워크스페이스 목록을 조회합니다
      operationId: workspace-my-list
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse-WorkspaceList"
              examples:
                workspace-my-list:
                  value: |-
                    {
                      "success" : true,
                      "data" : {
                        "items" : [ {
                          "id" : 1,
                          "name" : "워크스페이스",
                          "description" : "소개"
                        } ]
                      },
                      "message" : null
                    }
    post:
      tags:
      - Workspace
      summary: 워크스페이스 생성
      description: 워크스페이스 생성
      operationId: workspace-create
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
            examples:
              workspace-create-error:
                value: |-
                  {
                    "name" : "",
                    "description" : "소개"
                  }
              workspace-create:
                value: |-
                  {
                    "name" : "워크스페이스",
                    "description" : "소개"
                  }
      responses:
        "400":
          description: "400"
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail-Validation"
              examples:
                workspace-create-error:
                  value: |-
                    {
                      "type" : "/docs/index.html#error-code-list",
                      "title" : "C001",
                      "status" : 400,
                      "detail" : "잘못된 요청 형식입니다.",
                      "instance" : "/api/v1/workspaces",
                      "exception" : "MethodArgumentNotValidException",
                      "timestamp" : "2026-02-12T15:43:52.42326",
                      "fieldErrors" : [ {
                        "field" : "name",
                        "rejectedValue" : "",
                        "message" : "must not be blank"
                      } ]
                    }
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse-WorkspaceResponse"
              examples:
                workspace-create:
                  value: |-
                    {
                      "success" : true,
                      "data" : {
                        "id" : 1,
                        "name" : "워크스페이스",
                        "description" : "소개"
                      },
                      "message" : null
                    }
  /api/v1/auth/login:
    post:
      tags:
      - Auth
      summary: 로그인
      description: 이메일/비밀번호로 로그인합니다
      operationId: auth-login
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              auth-login:
                value: |-
                  {
                    "email" : "test@example.com",
                    "password" : "password123"
                  }
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse-AuthTokenResponse"
              examples:
                auth-login:
                  value: |-
                    {
                      "success" : true,
                      "data" : {
                        "accessToken" : "access.token.here",
                        "refreshToken" : "refresh.token.here"
                      },
                      "message" : null
                    }
  /api/v1/auth/logout:
    post:
      tags:
      - Auth
      summary: 로그아웃
      description: 리프레시 토큰을 해지합니다
      operationId: auth-logout
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
            examples:
              auth-logout:
                value: |-
                  {
                    "refreshToken" : "refresh.token.here"
                  }
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse-Void"
              examples:
                auth-logout:
                  value: |-
                    {
                      "success" : true,
                      "data" : null,
                      "message" : null
                    }
  /api/v1/auth/refresh:
    post:
      tags:
      - Auth
      summary: 토큰 갱신
      description: 리프레시 토큰으로 새 토큰을 발급받습니다
      operationId: auth-refresh
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
            examples:
              auth-refresh:
                value: |-
