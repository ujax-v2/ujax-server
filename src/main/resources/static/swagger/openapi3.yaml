      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse-AuthTokenResponse"
              examples:
                auth-refresh:
                  value: |-
                    {
                      "success" : true,
                      "data" : {
                        "accessToken" : "new.access.token",
                        "refreshToken" : "new.refresh.token"
                      },
                      "message" : null
                    }
  /api/v1/auth/signup:
    post:
      tags:
      - Auth
      summary: 회원가입
      description: 이메일/비밀번호로 회원가입합니다
      operationId: auth-signup
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
