openapi: 3.0.1
info:
  title: ujax API
  description: 백준 알고리즘 스터디 프로젝트 백엔드 API
  version: 0.0.1-SNAPSHOT
servers:
- url: http://localhost:8080
security:
- bearerAuth: []
tags: []
paths:
  /api/v1/workspaces:
    post:
      tags:
      - Workspace
      summary: 워크스페이스 생성
      description: 워크스페이스 생성
      operationId: workspace-create
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
            examples:
              workspace-create-error:
                value: |-
                  {
                    "name" : "",
                    "description" : "소개"
                  }
              workspace-create:
                value: |-
                  {
                    "name" : "워크스페이스",
                    "description" : "소개"
                  }
      responses:
        "400":
          description: "400"
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail-Validation"
              examples:
                workspace-create-error:
                  value: |-
                    {
                      "type" : "/docs/index.html#error-code-list",
                      "title" : "C001",
                      "status" : 400,
                      "detail" : "잘못된 요청 형식입니다.",
                      "instance" : "/api/v1/workspaces",
                      "exception" : "MethodArgumentNotValidException",
                      "timestamp" : "2026-03-23T16:55:02.436615",
                      "fieldErrors" : [ {
                        "field" : "name",
                        "rejectedValue" : "",
                        "message" : "must not be blank"
                      } ]
                    }
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse-WorkspaceResponse"
              examples:
                workspace-create:
                  value: |-
                    {
                      "success" : true,
                      "data" : {
                        "id" : 1,
                        "name" : "워크스페이스",
                        "description" : "소개",
                        "imageUrl" : "https://image.example.com/workspaces/1.png"
                      },
                      "message" : null
                    }
  /api/v1/auth/login:
