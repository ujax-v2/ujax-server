              auth-signup:
                value: |-
                  {
                    "email" : "test@example.com",
                    "password" : "password123",
                    "name" : "테스트유저"
                  }
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse-AuthTokenResponse"
              examples:
                auth-signup:
                  value: |-
                    {
                      "success" : true,
                      "data" : {
                        "accessToken" : "access.token.here",
                        "refreshToken" : "refresh.token.here"
                      },
                      "message" : null
                    }
