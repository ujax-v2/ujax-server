spring:
  profiles:
    default: local

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none

  mail:
    host: ${SMTP_HOST:smtp.daum.net}
    port: ${SMTP_PORT:465}
    username: ${SMTP_USERNAME:${SMTP_USER:username}}
    password: ${SMTP_PASSWORD:${SMTP_PASS:password}}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: ${SMTP_SECURE:true}
          starttls:
            enable: ${SMTP_STARTTLS_ENABLE:false}
            required: ${SMTP_STARTTLS_REQUIRED:false}
        "[mail.smtp.connectiontimeout]": 5000
        "[mail.smtp.timeout]": 3000
        "[mail.smtp.writetimeout]": 5000

app:
  auth:
    signup-verification:
      ttl-minutes: ${SIGNUP_VERIFICATION_TTL_MINUTES:5}
      code-length: ${SIGNUP_VERIFICATION_CODE_LENGTH:6}
    pending-signup-cleanup:
      enabled: ${PENDING_SIGNUP_CLEANUP_ENABLED:true}
      fixed-delay-millis: ${PENDING_SIGNUP_CLEANUP_FIXED_DELAY_MILLIS:60000}
      batch-size: ${PENDING_SIGNUP_CLEANUP_BATCH_SIZE:100}
  jwt:
    secret: ${JWT_SECRET:defaultDevSecretKeyThatIsAtLeast256BitsLongForHmacSha256Algorithm}
    access-expiration: 1800000
    refresh-expiration: 2592000000
  s3:
    bucket: ${S3_BUCKET:ujax-profile-images}
    region: ${S3_REGION:ap-northeast-2}
    access-key: ${S3_ACCESS_KEY:s3-access-key}
    secret-key: ${S3_SECRET_KEY:s3-secret-key}
    presigned-url-expiry: ${S3_PRESIGNED_URL_EXPIRY:300}
  ujax:
    base-url: ${UJAX_BASE_URL:https://ujax.site}
    frontend-callback-url: ${UJAX_FRONTEND_CALLBACK:https://ujax.site/auth/callback}
    mail:
      from: ${UJAX_MAIL_FROM:noreply@ujax.site}
      name: ${UJAX_MAIL_NAME:UJAX}
      outbox:
        scheduler:
          enabled: ${MAIL_OUTBOX_SCHEDULER_ENABLED:true}
          fixed-delay-millis: ${MAIL_OUTBOX_SCHEDULER_FIXED_DELAY_MILLIS:60000}
          batch-size: ${MAIL_OUTBOX_SCHEDULER_BATCH_SIZE:100}
        delivery:
          retry-delay-minutes: ${MAIL_OUTBOX_RETRY_DELAY_MINUTES:1}
          stuck-processing-minutes: ${MAIL_OUTBOX_STUCK_PROCESSING_MINUTES:10}
          max-attempts: ${MAIL_OUTBOX_MAX_ATTEMPTS:5}
  webhook-alert:
    scheduler:
      enabled: ${WEBHOOK_ALERT_SCHEDULER_ENABLED:true}
      fixed-delay-millis: ${WEBHOOK_ALERT_SCHEDULER_FIXED_DELAY_MILLIS:60000}
      batch-size: ${WEBHOOK_ALERT_SCHEDULER_BATCH_SIZE:100}
    delivery:
      retry-delay-minutes: ${WEBHOOK_ALERT_RETRY_DELAY_MINUTES:1}
      stuck-processing-minutes: ${WEBHOOK_ALERT_STUCK_PROCESSING_MINUTES:10}
      max-attempts: ${WEBHOOK_ALERT_MAX_ATTEMPTS:5}

spring.security.oauth2.client:
  registration:
    google:
      client-id: ${GOOGLE_CLIENT_ID:google-client-id}
      client-secret: ${GOOGLE_CLIENT_SECRET:google-client-secret}
      redirect-uri: ${GOOGLE_REDIRECT_URI}
      scope: email, profile
    kakao:
      client-id: ${KAKAO_CLIENT_ID:kakao-client-id}
      client-secret: ${KAKAO_CLIENT_SECRET:kakao-client-secret}
      redirect-uri: ${KAKAO_REDIRECT_URI}
      client-authentication-method: client_secret_post
      authorization-grant-type: authorization_code
      scope: profile_nickname, account_email, profile_image

  provider:
    kakao:
      authorization-uri: https://kauth.kakao.com/oauth/authorize
      token-uri: https://kauth.kakao.com/oauth/token
      user-info-uri: https://kapi.kakao.com/v2/user/me
      user-name-attribute: id

# Actuator + Prometheus Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: never
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ujax-server
