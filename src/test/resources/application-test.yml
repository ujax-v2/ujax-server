spring:
  config:
    activate:
      on-profile: test

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never
  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379

judge0:
  api:
    url: http://localhost:2358
app:
  s3:
    bucket: test-bucket
    region: ap-northeast-2
    access-key: test-access-key
    secret-key: test-secret-key
    presigned-url-expiry: 300
  auth:
    pending-signup-cleanup:
      enabled: false
  jwt:
    secret: testSecretKeyThatIsAtLeast256BitsLongForHmacSha256AlgorithmInTestProfile
    access-expiration: 1800000
    refresh-expiration: 2592000000
  webhook-alert:
    scheduler:
      enabled: ${WEBHOOK_ALERT_SCHEDULER_ENABLED:false}
      fixed-delay-millis: ${WEBHOOK_ALERT_SCHEDULER_FIXED_DELAY_MILLIS:60000}
      batch-size: ${WEBHOOK_ALERT_SCHEDULER_BATCH_SIZE:100}
    delivery:
      retry-delay-minutes: ${WEBHOOK_ALERT_RETRY_DELAY_MINUTES:1}
      stuck-processing-minutes: ${WEBHOOK_ALERT_STUCK_PROCESSING_MINUTES:10}
      max-attempts: ${WEBHOOK_ALERT_MAX_ATTEMPTS:5}
  ujax:
    mail:
      outbox:
        scheduler:
          enabled: false
