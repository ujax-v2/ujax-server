<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980" role="img" aria-labelledby="title desc">
  <title id="title">Mail Outbox Refactor Structure</title>
  <desc id="desc">현재 메일 아웃박스 리팩터링 구조를 application, domain, infrastructure 레이어와 호출 흐름 기준으로 정리한 다이어그램</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
    <marker id="arrow-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e" />
    </marker>
    <style>
      .title { font: 700 28px 'SF Pro Display', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; fill: #0f172a; }
      .subtitle { font: 400 14px 'SF Pro Text', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; fill: #475569; }
      .panel-title { font: 700 20px 'SF Pro Display', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }
      .box-title { font: 700 18px 'SF Pro Display', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; fill: #0f172a; }
      .box-subtitle { font: 600 12px ui-monospace, 'SFMono-Regular', Menlo, monospace; fill: #334155; }
      .box-text { font: 400 13px 'SF Pro Text', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; fill: #334155; }
      .small-text { font: 400 12px 'SF Pro Text', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; fill: #334155; }
      .tiny-text { font: 400 11px 'SF Pro Text', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; fill: #475569; }
      .chip-text { font: 600 12px 'SF Pro Text', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; fill: #7f1d1d; }
      .flow-label { font: 600 12px 'SF Pro Text', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; fill: #0f766e; }
      .line-label { font: 600 12px 'SF Pro Text', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect width="1500" height="980" fill="#f8fafc" />
  <rect x="24" y="24" width="1452" height="932" rx="28" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />

  <text x="60" y="78" class="title">메일 아웃박스 리팩터링 구조</text>
  <text x="60" y="108" class="subtitle">스케줄러는 infrastructure로 이동, 서비스는 MailNotifier만 의존, SMTP 구현은 MailSender 어댑터로 분리</text>

  <rect x="56" y="140" width="620" height="720" rx="24" fill="#eef6ff" stroke="#bfdbfe" stroke-width="2" />
  <rect x="700" y="140" width="300" height="720" rx="24" fill="#fff7ed" stroke="#fed7aa" stroke-width="2" />
  <rect x="1024" y="140" width="420" height="720" rx="24" fill="#ecfdf5" stroke="#86efac" stroke-width="2" />

  <text x="86" y="178" class="panel-title" fill="#1d4ed8">Application</text>
  <text x="730" y="178" class="panel-title" fill="#c2410c">Domain</text>
  <text x="1054" y="178" class="panel-title" fill="#15803d">Infrastructure</text>

  <rect x="88" y="220" width="236" height="104" rx="18" fill="#ffffff" stroke="#93c5fd" stroke-width="2" />
  <text x="108" y="252" class="box-title">AuthService</text>
  <text x="108" y="272" class="box-subtitle">application.auth</text>
  <text x="108" y="296" class="box-text">회원가입 시작 시</text>
  <text x="108" y="316" class="box-text">`mailNotifier.enqueueSignupVerification(...)` 호출</text>

  <rect x="360" y="220" width="272" height="104" rx="18" fill="#ffffff" stroke="#93c5fd" stroke-width="2" />
  <text x="380" y="252" class="box-title">WorkspaceMembershipService</text>
  <text x="380" y="272" class="box-subtitle">application.workspace</text>
  <text x="380" y="296" class="box-text">멤버 초대 시</text>
  <text x="380" y="316" class="box-text">`mailNotifier.enqueueWorkspaceInvite(...)` 호출</text>

  <rect x="162" y="374" width="356" height="84" rx="18" fill="#ffffff" stroke="#60a5fa" stroke-width="2" stroke-dasharray="8 6" />
  <text x="182" y="406" class="box-title">MailNotifier</text>
  <text x="182" y="426" class="box-subtitle">application.mail</text>
  <text x="182" y="446" class="box-text">서비스가 바라보는 메일 enqueue 포트</text>

  <rect x="150" y="500" width="380" height="128" rx="18" fill="#ffffff" stroke="#93c5fd" stroke-width="2" />
  <text x="170" y="532" class="box-title">OutboxMailNotifier</text>
  <text x="170" y="552" class="box-subtitle">application.mail.outbox</text>
  <text x="170" y="576" class="box-text">MailNotifier 구현체</text>
  <text x="170" y="596" class="box-text">payload 직렬화 + MailOutbox 저장 + enqueue 로그 기록</text>
  <text x="170" y="616" class="box-text">기존 producer 책임을 여기로 통합</text>

  <rect x="150" y="670" width="380" height="128" rx="18" fill="#ffffff" stroke="#93c5fd" stroke-width="2" />
  <text x="170" y="702" class="box-title">MailOutboxService</text>
  <text x="170" y="722" class="box-subtitle">application.mail.outbox</text>
  <text x="170" y="746" class="box-text">reserve / recover / deliver 유스케이스 담당</text>
  <text x="170" y="766" class="box-text">구현체가 아니라 MailSender 포트만 의존</text>
  <text x="170" y="786" class="box-text">SMTP, 스케줄링 세부사항은 모름</text>

  <rect x="552" y="690" width="92" height="88" rx="18" fill="#ffffff" stroke="#60a5fa" stroke-width="2" stroke-dasharray="8 6" />
  <text x="570" y="722" class="box-title">MailSender</text>
  <text x="570" y="742" class="box-subtitle">app port</text>
  <text x="570" y="762" class="box-text">send()</text>

  <rect x="722" y="304" width="256" height="140" rx="18" fill="#ffffff" stroke="#fdba74" stroke-width="2" />
  <text x="742" y="336" class="box-title">MailOutbox</text>
  <text x="742" y="356" class="box-subtitle">domain.mail</text>
  <text x="742" y="380" class="box-text">메일 아웃박스 엔티티</text>
  <text x="742" y="400" class="box-text">mailType / recipient / payloadJson / status / nextAttemptAt</text>
  <text x="742" y="420" class="box-text">DB 테이블: `mail_outbox`</text>

  <rect x="722" y="486" width="256" height="108" rx="18" fill="#ffffff" stroke="#fdba74" stroke-width="2" />
  <text x="742" y="518" class="box-title">MailOutboxRepository</text>
  <text x="742" y="538" class="box-subtitle">domain.mail</text>
  <text x="742" y="562" class="box-text">애플리케이션이 outbox row를 저장/조회할 때 사용</text>

  <rect x="1060" y="220" width="348" height="112" rx="18" fill="#ffffff" stroke="#4ade80" stroke-width="2" />
  <text x="1080" y="252" class="box-title">PendingSignupCleanupScheduler</text>
  <text x="1080" y="272" class="box-subtitle">infrastructure.scheduling.auth</text>
  <text x="1080" y="296" class="box-text">`@Scheduled`, `@ConditionalOnProperty`</text>
  <text x="1080" y="316" class="box-text">런타임 wiring만 담당, application에서 제거</text>

  <rect x="1060" y="372" width="348" height="112" rx="18" fill="#ffffff" stroke="#4ade80" stroke-width="2" />
  <text x="1080" y="404" class="box-title">MailOutboxScheduler</text>
  <text x="1080" y="424" class="box-subtitle">infrastructure.scheduling.mail</text>
  <text x="1080" y="448" class="box-text">`@Scheduled`, `@ConditionalOnProperty`</text>
  <text x="1080" y="468" class="box-text">MailOutboxService batch 실행 담당</text>

  <rect x="1060" y="570" width="348" height="136" rx="18" fill="#ffffff" stroke="#4ade80" stroke-width="2" />
  <text x="1080" y="602" class="box-title">SmtpMailSender</text>
  <text x="1080" y="622" class="box-subtitle">infrastructure.external.mail</text>
  <text x="1080" y="646" class="box-text">MailSender 구현체</text>
  <text x="1080" y="666" class="box-text">JavaMailSender / MimeMessageHelper / SMTP 예외 처리</text>
  <text x="1080" y="686" class="box-text">기존 application.mail.outbox.UjaxSmtpMailSender 대체</text>

  <rect x="1060" y="742" width="348" height="86" rx="18" fill="#f0fdf4" stroke="#86efac" stroke-width="2" />
  <text x="1080" y="774" class="box-title">Scheduler Properties</text>
  <text x="1080" y="794" class="box-subtitle">infrastructure.config.*</text>
  <text x="1080" y="814" class="box-text">스케줄러 전용 설정 클래스도 application 밖으로 이동</text>

  <path d="M 206 324 L 290 374" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" />
  <path d="M 496 324 L 390 374" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" />
  <text x="300" y="354" class="line-label">서비스는 구현이 아니라 포트만 호출</text>

  <path d="M 340 458 L 340 500" fill="none" stroke="#0f766e" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#arrow-soft)" />
  <text x="354" y="484" class="flow-label">implements</text>

  <path d="M 530 552 L 722 552" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" />
  <text x="574" y="536" class="line-label">save outbox row</text>

  <path d="M 530 720 L 552 720" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" />
  <text x="458" y="690" class="line-label">deliver</text>

  <path d="M 644 734 L 1060 638" fill="none" stroke="#0f766e" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#arrow-soft)" />
  <text x="812" y="666" class="flow-label">implemented by infrastructure adapter</text>

  <path d="M 530 742 L 722 542" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" />
  <text x="590" y="640" class="line-label">find / reserve / update status</text>

  <path d="M 1060 428 L 530 728" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" />
  <text x="842" y="520" class="line-label">batch triggers MailOutboxService</text>

  <path d="M 1060 270 L 676 270" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" />
  <text x="820" y="252" class="line-label">calls PendingSignupCleanupService</text>

  <rect x="88" y="846" width="1320" height="72" rx="18" fill="#fff1f2" stroke="#fda4af" stroke-width="2" />
  <text x="112" y="874" class="box-title" fill="#b91c1c">이번에 제거되거나 application에서 빠진 것</text>

  <rect x="414" y="856" width="238" height="42" rx="14" fill="#ffffff" stroke="#fca5a5" stroke-width="1.5" />
  <text x="432" y="882" class="chip-text">SignupVerificationMailOutboxProducer 삭제</text>

  <rect x="674" y="856" width="230" height="42" rx="14" fill="#ffffff" stroke="#fca5a5" stroke-width="1.5" />
  <text x="692" y="882" class="chip-text">WorkspaceInviteMailOutboxProducer 삭제</text>

  <rect x="924" y="856" width="188" height="42" rx="14" fill="#ffffff" stroke="#fca5a5" stroke-width="1.5" />
  <text x="942" y="882" class="chip-text">UjaxSmtpMailSender 삭제</text>

  <rect x="1132" y="856" width="254" height="42" rx="14" fill="#ffffff" stroke="#fca5a5" stroke-width="1.5" />
  <text x="1150" y="882" class="chip-text">application.* Scheduler / Properties 제거</text>
</svg>
